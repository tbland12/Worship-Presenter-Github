<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: worship-media:; media-src 'self' blob: worship-media:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-src 'none'" />
    <title>Background Library</title>
    <link rel="stylesheet" href="library.css" />
    <link rel="stylesheet" href="shared/ui.css" />
  </head>
  <body>
    <div class="library-app">
      <header class="library-header">
        <div class="library-brand">
          <span class="library-motif" aria-hidden="true"></span>
          <div>
            <div class="library-eyebrow">Worship Presenter</div>
            <div class="library-title">Media Library</div>
            <div class="library-path" id="library-path" role="status">Loading media...</div>
          </div>
        </div>
        <div class="library-actions">
          <label class="library-search">
            <span class="visually-hidden">Search media</span>
            <input id="library-search" type="search" placeholder="Search media" autocomplete="off" />
          </label>
          <div class="library-filters" role="group" aria-label="Filter library">
            <button id="filter-all" type="button" class="active">All <span id="filter-all-count">0</span></button>
            <button id="filter-images" type="button">Images <span id="filter-images-count">0</span></button>
            <button id="filter-videos" type="button">Videos <span id="filter-videos-count">0</span></button>
          </div>
          <button id="import-pack" type="button">Import Pack</button>
          <button id="refresh-library" type="button" title="Refresh library">Refresh</button>
          <button class="appearance-toggle" id="appearance-toggle" type="button" aria-label="Switch appearance">
            <svg class="appearance-icon appearance-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6 7 7M17 17l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4" />
              <circle cx="12" cy="12" r="4" />
            </svg>
            <svg class="appearance-icon appearance-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M20 15.2A8.5 8.5 0 0 1 8.8 4a8.5 8.5 0 1 0 11.2 11.2Z" />
            </svg>
          </button>
          <button id="close-library" class="close-library" type="button">Close</button>
        </div>
      </header>

      <main class="library-main">
        <div class="library-grid" id="library-grid"></div>
        <div class="empty-hint" id="library-empty">No media matches this view.</div>
      </main>
    </div>

    <div class="toast-region" id="toast-region" aria-live="polite" aria-relevant="additions"></div>

    <script type="module" src="library.js"></script>
  </body>
</html>
